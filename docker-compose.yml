version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: projeto-igreja-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: projeto_igreja
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto-igreja-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=projeto_igreja
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    # Comando útil para garantir instalar o vendor e gerar a key, caso não existam
    command: bash -c "composer install && php artisan key:generate --no-interaction && php artisan migrate --force && apache2-foreground"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projeto-igreja-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  dbdata:
